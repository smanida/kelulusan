<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pengumuman Kelulusan</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    background: #f8f9fa;
}

.card {
    border-radius: 15px;
}

#countdown {
    font-size: 1.5rem;
    font-weight: bold;
}

footer {
    font-size: 14px;
    color: #6c757d;
}
</style>
</head>
<body>

<div class="container d-flex flex-column justify-content-center align-items-center vh-100">

    <!-- CARD -->
    <div class="card shadow p-4 text-center w-100" style="max-width: 420px;">

        <!-- LOGO -->
        <img src="https://res.cloudinary.com/dq4snx0ml/image/upload/v1762918483/logosma_ppjhiz.png"
             alt="Logo Sekolah"
             style="width:80px; margin:auto;">

        <h5 class="mt-2 mb-1">Pengumuman Kelulusan</h5>
        <p class="text-muted mb-2">SMAN 1 Cidahu</p>

        <!-- DEMO BUTTON -->
        <div class="mb-3">
            <button id="demoToggle" class="btn btn-warning btn-sm">
                <i class="bi bi-lightning-charge"></i> Mode Demo: OFF
            </button>
        </div>

        <!-- COUNTDOWN -->
        <div id="countdownBox">
            <p class="mb-1">
                <i class="bi bi-clock"></i> Dibuka dalam:
            </p>
            <div id="countdown" class="text-primary"></div>
        </div>

        <!-- FORM -->
        <div id="formBox" class="d-none">
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-person-badge"></i>
                </span>
                <input type="text" id="nisn" class="form-control" placeholder="Masukkan NISN">
            </div>

            <button onclick="cekKelulusan()" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Cek Kelulusan
            </button>
        </div>

        <!-- HASIL -->
        <div id="hasil" class="mt-3"></div>

    </div>

    <!-- FOOTER -->
    <footer class="mt-3 text-center">
        <p class="mb-1">
            <i class="bi bi-info-circle"></i>
            Hasil kelulusan bersifat resmi dan tidak untuk disebarluaskan
        </p>
        <p class="mb-0">
            &copy; 2026 SMAN 1 Cidahu
        </p>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
