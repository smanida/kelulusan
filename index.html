<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pengumuman Kelulusan</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f8f9fa;
}

.card {
    border-radius: 15px;
}

#countdown {
    font-size: 1.5rem;
    font-weight: bold;
}

.lulus {
    color: green;
    font-weight: bold;
}

.tidak {
    color: red;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="mb-3">
    <button id="demoToggle" class="btn btn-warning btn-sm">
        Mode Demo: OFF
    </button>
</div>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 text-center w-100" style="max-width: 420px;">

        <h4 class="mb-1">Pengumuman Kelulusan</h4>
        <p class="text-muted mb-3">SMAN 1 Cidahu</p>

        <!-- COUNTDOWN -->
        <div id="countdownBox">
            <p class="mb-1">Dibuka dalam:</p>
            <div id="countdown" class="text-primary"></div>
        </div>

        <!-- FORM -->
        <div id="formBox" class="d-none">
            <input type="text" id="nisn" class="form-control mb-3" placeholder="Masukkan NISN">
            <button onclick="cekKelulusan()" class="btn btn-primary w-100">
                Cek Kelulusan
            </button>
        </div>

        <!-- HASIL -->
        <div id="hasil" class="mt-3"></div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body>
</html>
